name: Create PR from Feature Branch

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - 'feat/initial-game-structure'

jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Feature: Initial Game Structure'
          base: 'feature/core-gameplay-and-minigames'
          branch: 'feat/initial-game-structure'
          body: |
            This PR was automatically created from the feature branch.
            - **Author**: @${{ github.actor }}
          assignees: ${{ github.actor }}
          labels: new-feature, needs-review
